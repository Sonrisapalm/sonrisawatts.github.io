<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article 39 | Dr. Vineetha Binoy</title>
    <style>
        :root {
            --accent: #2dd4bf; /* High-end Teal */
            --bg: #030712;
            --card-bg: #111827;
            --text-main: #f9fafb;
            --text-dim: #9ca3af;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(45, 212, 191, 0.08) 0%, rgba(3, 7, 18, 0) 70%);
            top: -150px;
            right: -100px;
            z-index: 0;
        }

        .article-card {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            padding: clamp(2rem, 5vw, 4rem);
            max-width: 650px;
            width: 90%;
            box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
        }

        /* Top metadata layout */
        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .badge {
            background: rgba(45, 212, 191, 0.1);
            color: var(--accent);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid rgba(45, 212, 191, 0.2);
        }

        .origin-brief {
            font-size: 0.7rem;
            color: var(--text-dim);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 0.9;
            margin: 0 0 2rem 0;
            background: linear-gradient(135deg, #fff 40%, rgba(255,255,255,0.4));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .profile-info {
            margin-bottom: 3.5rem;
        }

        .name {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
            display: block;
        }

        /* Caribbean Emphasis Styling */
        .active-location {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(45, 212, 191, 0.05);
            padding: 8px 16px;
            border-radius: 12px;
            border-left: 3px solid var(--accent);
            margin-top: 10px;
        }

        .location-text {
            color: var(--accent);
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: -0.02em;
        }

        .pulse-dot {
            height: 8px;
            width: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 1; }
            70% { transform: scale(1.5); opacity: 0; }
            100% { transform: scale(0.9); opacity: 0; }
        }

        .research-summary {
            margin-top: 20px;
            font-size: 1rem;
            color: var(--text-dim);
            line-height: 1.6;
            max-width: 480px;
        }

        /* Footer Progress */
        .status-footer {
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 1.5rem;
        }

        .loading-bar {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .loading-fill {
            width: 30%;
            height: 100%;
            background: var(--accent);
            animation: flow 3s infinite ease-in-out;
        }

        @keyframes flow {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(350%); }
        }

        .coming-soon {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-dim);
        }

        @media (max-width: 600px) {
            .article-card { padding: 2.5rem 1.5rem; }
            .top-row { flex-direction: column; align-items: flex-start; gap: 1rem; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="article-card">
        <div class="top-row">
            <div class="badge">Article 39</div>
            <div class="origin-brief">India / Austria <span style="opacity: 0.3; margin-left: 5px;">| Founding Expertise</span></div>
        </div>

        <h1>Oncology<br>Decoded.</h1>
        
        <div class="profile-info">
            <span class="name">Dr. Vineetha Binoy</span>
            
            <div class="active-location">
                <div class="pulse-dot"></div>
                <span class="location-text">Cayman Islands</span>
            </div>

            <p class="research-summary">
                Senior Medical Oncologist dedicated to <span style="color: #fff; font-weight: 600;">Caribbean healthcare dynamics</span>, bridging global innovation with regional patient-centered insights.
            </p>
        </div>

        <div class="status-footer">
            <div class="loading-bar">
                <div class="loading-fill"></div>
            </div>
            <div class="coming-soon">
                <span style="letter-spacing: 0.1em;">ENCODING RESEARCH</span>
                <span style="color: #fff;">MARCH 2026</span>
            </div>
        </div>
    </div>

</body>
</html>
