<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article 39 | Dr. Vineetha Binoy</title>
    <style>
        :root {
            --accent: #6366f1; /* Modern Indigo */
            --bg: #030712;
            --card-bg: #111827;
            --text-main: #f9fafb;
            --text-dim: #9ca3af;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Abstract geometric background */
        .bg-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(3, 7, 18, 0) 70%);
            top: -100px;
            right: -100px;
            z-index: 0;
        }

        .article-card {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 3rem;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
        }

        .badge {
            display: inline-block;
            background: rgba(99, 102, 241, 0.1);
            color: var(--accent);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 2rem;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1;
            margin: 0 0 1.5rem 0;
            background: linear-gradient(to bottom right, #fff 50%, #6b7280);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .meta {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 3rem;
        }

        .meta .name {
            font-size: 1.25rem;
            font-weight: 600;
            color: #fff;
        }

        .meta .title {
            color: var(--text-dim);
            font-size: 0.95rem;
        }

        /* Sleek Progress/Loading Bar */
        .loading-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .progress-bar {
            width: 40%;
            height: 100%;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            animation: slide 2s infinite ease-in-out;
        }

        @keyframes slide {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(250%); }
        }

        .coming-soon-text {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: var(--accent);
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .article-card { padding: 2rem; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="article-card">
        <div class="badge">Article 39</div>
        <h1>Oncology<br>Decoded.</h1>
        
        <div class="meta">
            <span class="name">Dr. Vineetha Binoy</span>
            <span class="title">Senior Medical Oncologist</span>
        </div>

        <div class="loading-container">
            <div class="progress-bar"></div>
        </div>
        
        <div class="coming-soon-text">
            <span>Encoding Research Insights</span>
            <span style="color: #fff;">03 / 2026</span>
        </div>
    </div>

</body>
</html>
