<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact // Emotion Encoded</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --teal: #2dd4bf;
            --dark-bg: #0a0c10;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(45, 212, 191, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(45, 212, 191, 0.05) 0%, transparent 40%);
            color: #e4e4e7;
            margin: 0;
            min-height: 100vh;
        }

        /* --- NAVIGATION --- */
        nav {
            background: rgba(10, 12, 16, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav a {
            color: #a1a1aa;
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        nav a:hover {
            color: var(--teal);
            text-shadow: 0 0 10px rgba(45, 212, 191, 0.5);
        }

        /* --- GLASSMORPHIC MAIN CARD --- */
        main {
            max-width: 800px;
            margin: 4rem auto;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        /* Loading Line Animation */
        main::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--teal), transparent);
            animation: loadingMove 4s infinite linear;
        }

        @keyframes loadingMove {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        h1 {
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .contact-subtitle {
            color: #71717a;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        /* --- FORM STYLING --- */
        label {
            display: block;
            margin: 1.5rem 0 0.5rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--teal);
            font-weight: 600;
        }

        input, textarea {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: var(--teal);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 15px rgba(45, 212, 191, 0.1);
        }

        button {
            margin-top: 2rem;
            width: 100%;
            padding: 1rem;
            background: var(--teal);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(45, 212, 191, 0.4);
            filter: brightness(1.1);
        }

        .social-links {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .social-links a {
            color: #a1a1aa;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: #fff;
        }

        /* --- ROBOT FLOATER --- */
        .robot-terminal {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 280px;
            z-index: 1000;
            animation: cyberFloat 4s ease-in-out infinite;
            text-decoration: none;
        }

        .head-shell {
            background: rgba(10, 10, 12, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(45, 212, 191, 0.3);
            border-radius: 40px 40px 15px 15px;
            padding: 20px;
            text-align: center;
        }

        .visor-eyes {
            display: flex; gap: 10px; justify-content: center; margin-top: 10px;
        }

        .cyber-eye {
            width: 14px; height: 3px; background: var(--teal); box-shadow: 0 0 10px var(--teal);
        }

        @keyframes cyberFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

    </style>
</head>
<body>

<nav class="flex justify-center flex-wrap gap-4">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="Methodsanddata.html">Methods & Data</a>
    <a href="DataAnalysisquantitative.html">Publications</a>
    <a href="ethicalguidelines.html">Ethics</a>
    <a href="contact.html" style="color:white;">Contact</a>
</nav>

<main>
    <h1>Secure Transmission</h1>
    <p class="contact-subtitle">
        Initiate a connection for research collaborations or inquiries. <br>
        Direct Channel: <strong>sonrisawatts@encodedemotion.org</strong>
    </p>

    <form action="mailto:sonrisawatts@encodedemotion.org" method="post" enctype="text/plain">
        <label for="name">Subject Identity</label>
        <input id="name" name="name" type="text" placeholder="Your Name" required />

        <label for="email">Return Protocol (Email)</label>
        <input id="email" name="email" type="email" placeholder="email@example.com" required />

        <label for="message">Data Payload (Message)</label>
        <textarea id="message" name="message" rows="5" placeholder="How can I assist you?" required></textarea>

        <button type="submit">Execute Transmission</button>
    </form>

    <div class="social-links">
        <a href="https://www.facebook.com/EmotionEncoded/" target="_blank">
            <span style="color:var(--teal)">FB //</span> facebook.com/EmotionEncoded
        </a>
    </div>
</main>

<a href="DataAnalysisquantitative.html" class="robot-terminal">
    <div class="head-shell">
        <p style="color:white; font-size: 12px; margin:0 0 10px 0; font-weight: 300;">
            Researching <strong>AI Trust</strong> & Cognitive Bias.
        </p>
        <div class="visor-eyes">
            <div class="cyber-eye"></div>
            <div class="cyber-eye"></div>
        </div>
    </div>
</a>

</body>
</html>
