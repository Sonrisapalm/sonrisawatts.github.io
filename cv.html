<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Preview | Emotion Encoded</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;500;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #2dd4bf;
            --bg: #0a0c10;
            --border: rgba(255, 255, 255, 0.06);
            --text-muted: #9ca3af;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        .nav-container {
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            background: rgba(10, 12, 16, 0.7);
            height: 70px;
            flex-shrink: 0;
        }

        .cv-wrapper {
            flex-grow: 1; /* Takes up all available space */
            width: 100%;
            padding: 20px 20px 10px 20px;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            max-width: 1000px;
            height: 100%;
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* BOTTOM ACTION BAR */
        .action-bar {
            height: 80px;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to top, rgba(10, 12, 16, 1), transparent);
            padding-bottom: 10px;
        }

        .download-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(45, 212, 191, 0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px rgba(45, 212, 191, 0.4);
        }
    </style>
</head>
<body>

    <nav class="nav-container flex items-center justify-center">
        <div class="flex gap-8">
            <a href="index.html" class="text-[11px] uppercase tracking-[.25em] text-zinc-500 hover:text-white transition">Back to Home</a>
            <span class="text-[11px] uppercase tracking-[.25em] text-[#2dd4bf] font-bold">Curriculum Vitae</span>
        </div>
    </nav>

    <main class="cv-wrapper">
        <iframe src="images/sonrisawattscv.pdf#toolbar=0" type="application/pdf">
            <p>Your browser does not support PDFs. <a href="images/sonrisawattscv.pdf">Download PDF</a></p>
        </iframe>
    </main>

    <div class="action-bar">
        <a href="images/sonrisawattscv.pdf" download class="download-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            Download Document
        </a>
    </div>

</body>
</html>
