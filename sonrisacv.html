<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Preview | Emotion Encoded</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: white;
            overflow-x: hidden;
        }

        /* Ambient background depth */
        .ambient-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% -20%, rgba(29, 78, 216, 0.15), transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* The Luxury Frame */
        .cv-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        /* PDF Viewer styling */
        .viewer-height {
            height: 85vh; /* Takes up most of the screen for readability */
        }

        iframe {
            width: 100%;
            height: 100%;
            border-radius: 0 0 20px 20px;
            border: none;
        }

        .premium-btn {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            letter-spacing: 0.2em;
        }

        .premium-btn:hover {
            background: white;
            color: black;
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="antialiased">

    <div class="ambient-glow"></div>

    <nav class="p-8 flex justify-between items-center">
        <div class="text-xs font-bold tracking-[0.4em] uppercase opacity-50">
            Dossier // 001
        </div>
        <a href="index.html" class="text-[10px] uppercase tracking-widest opacity-70 hover:opacity-100 transition-opacity">
            Close Preview ✕
        </a>
    </nav>

    <main class="max-w-5xl mx-auto px-6 pb-20">
        
        <div class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div>
                <h1 class="text-4xl md:text-6xl font-light tracking-tighter uppercase mb-2">
                    Sonrisa <span class="italic font-extralight text-gray-500">Watts</span>
                </h1>
                <p class="text-blue-500 text-[10px] font-bold uppercase tracking-[0.4em]">Curriculum Vitae • Research Initiative</p>
            </div>
            
            <a href="images/sonrisacv.pdf" download class="premium-btn border border-white/20 px-8 py-3 rounded-full text-[10px] font-bold uppercase">
                Download Original PDF
            </a>
        </div>

        <div class="cv-container">
            <div class="px-6 py-4 border-b border-white/10 flex items-center justify-between bg-white/5">
                <div class="flex space-x-2">
                    <div class="w-2 h-2 rounded-full bg-red-500/50"></div>
                    <div class="w-2 h-2 rounded-full bg-yellow-500/50"></div>
                    <div class="w-2 h-2 rounded-full bg-green-500/50"></div>
                </div>
                <span class="text-[9px] text-gray-500 uppercase tracking-widest font-medium">sonrisawattscv.pdf — Authorized Access</span>
                <div class="w-10"></div> </div>

            <div class="viewer-height bg-[#1a1a1a]">
                <iframe 
                    src="images/sonrisawattscv.pdf#toolbar=0&navpanes=0&scrollbar=0" 
                    type="application/pdf">
                </iframe>
            </div>
        </div>

        <div class="mt-12 text-center">
            <p class="text-gray-600 text-[9px] uppercase tracking-[0.5em] leading-relaxed">
                Emotion Encoded Independent Archive <br> 
                Psychology // AI Governance // Caribbean Data
            </p>
        </div>

    </main>

</body>
</html>
